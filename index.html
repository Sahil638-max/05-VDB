<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vaidehi ❤️</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff4d6d,#ff758c,#ff7eb3);
  color:white;
  text-align:center;
  overflow:hidden;
}
/* Slides */
.slide{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  animation:fade 1s;
}
.slide.active{display:flex;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

/* Card style */
.card{
  background:rgba(255,255,255,0.15);
  padding:40px;
  border-radius:25px;
  backdrop-filter:blur(12px);
  width:85%;
  max-width:550px;
  box-shadow:0 0 35px rgba(255,255,255,0.25);
  transform:scale(0.95);
  animation:cardIn 0.6s forwards;
}
@keyframes cardIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}

h1{font-size:38px;margin-bottom:15px;text-shadow:0 0 15px #fff;}
p{font-size:20px;line-height:1.6;}

.btn{
  margin-top:20px;
  padding:12px 28px;
  border:none;border-radius:25px;
  background:white;color:#ff4d6d;font-size:17px;
  cursor:pointer;transition:0.3s;
}
.btn:hover{transform:scale(1.1);}

/* Hearts */
.heart{
  position:absolute;bottom:-20px;font-size:22px;
  animation:floatUp 6s linear infinite;
}
@keyframes floatUp{0%{transform:translateY(0);}100%{transform:translateY(-120vh);}}

/* Fireworks */
.firework{
  position:absolute;font-size:35px;
  animation:boom 1.2s ease-out;
}
@keyframes boom{0%{transform:scale(0);}50%{transform:scale(1.5);}100%{transform:scale(2);opacity:0;}}

/* Pizza & Waffles */
.food{font-size:60px;animation:bounce 1s infinite alternate;}
@keyframes bounce{0%{transform:translateY(0);}100%{transform:translateY(-20px);}}
</style>
</head>
<body>

<!-- Tu Chahiye Song -->
<iframe width="0" height="0" 
src="https://www.youtube.com/embed/x3nef28?autoplay=1&start=30&loop=1&playlist=x3nef28"
frameborder="0" allow="autoplay"></iframe>

<!-- Slide 1 -->
<div class="slide active"><div class="card">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<!-- Slide 2 -->
<div class="slide"><div class="card">
<h1>You Are My Happiness 💞</h1>
<p id="text2"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<!-- Slide 3 -->
<div class="slide"><div class="card">
<h1>Pizza & Waffles 🍕🧇</h1>
<p id="text3"></p>
<div class="food">🍕🧇❤️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<!-- Slide 4 -->
<div class="slide"><div class="card">
<h1>My Promises 💍</h1>
<p id="text4"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<!-- Slide 5 -->
<div class="slide"><div class="card">
<h1>Always There 🫂</h1>
<p id="text5"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<!-- Slide 6 -->
<div class="slide"><div class="card">
<h1 class="glow">I Love You ❤️</h1>
<p id="text6"></p>
</div></div>

<script>
let slides=document.querySelectorAll(".slide");
let index=0;

function next(){
  slides[index].classList.remove("active");
  index++;
  if(index<slides.length){
    slides[index].classList.add("active");
    startTyping(index);
  }
}

function typeText(id,text){
  let el=document.getElementById(id);
  if(!el) return;
  let i=0; el.innerHTML="";
  let interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },35);
}

let texts=[
"Every day your smile makes my heart overflow… you make me the happiest person in the world ❤️",
"I am the luckiest just because you exist and love me 💖",
"Our moments… pizza nights, waffle mornings, laughter, love… are my treasures 🍕🧇💞",
"I promise to always be there for you, support you, care for you, and hold your hand through everything 💍",
"No matter what happens, I will always be there for you every time you need me 🫂❤️",
"You are my everything. I love you Vaidehi ♾️❤️"
];

function startTyping(i){
  if(texts[i]) typeText("text"+(i+1),texts[i]);
}
startTyping(0);

/* Floating Hearts */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),7000);
},300);

/* Fireworks */
setInterval(()=>{
  let f=document.createElement("div");
  f.className="firework";
  f.innerHTML="✨";
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*80+"vh";
  f.style.color=["#FFD700","#FF69B4","#00FFFF","#FF4500"][Math.floor(Math.random()*4)];
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1200);
},400);
</script>
</body>
</html>
