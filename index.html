<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vaidehi ❤️</title>
<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#ff4d6d);
color:white;
text-align:center;
overflow:hidden;
}

/* Slides */
.slide{display:none;height:100vh;padding-top:60px;animation:fade 1s;}
.active{display:block;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

/* Text */
h1{font-size:45px;}
p{font-size:22px;width:70%;margin:auto;min-height:60px;}

/* Button */
.btn{margin-top:30px;padding:12px 25px;border:none;border-radius:25px;background:white;color:#ff4d6d;font-size:18px;cursor:pointer;}
.emoji{font-size:90px;margin-top:20px;}

/* Floating hearts with name */
.heart{position:absolute;bottom:-20px;font-size:25px;animation:float 6s linear infinite;}
@keyframes float{0%{transform:translateY(0);}100%{transform:translateY(-110vh);}}

/* Candles & cake */
.candles{font-size:45px;cursor:pointer;margin-top:20px;}
.cake{font-size:120px;cursor:pointer;margin-top:20px;transition:0.6s;}
.cut{transform:scale(1.2) rotate(-10deg);}
.slice{display:none;font-size:110px;}
.show{display:block;}

/* Glow */
.glow{animation:glow 1.5s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px white;}to{text-shadow:0 0 30px yellow;}
}

/* Fireworks emoji */
.firework{position:absolute;font-size:40px;}
</style>
</head>
<body>

<!-- Music Player -->
<audio id="bgMusic" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
<button class="btn" onclick="toggleMusic()">Pause/Play Music 🎵</button>

<!-- Slide 1 -->
<div class="slide active">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<div class="emoji">✨💖</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 2 -->
<div class="slide">
<h1>You = My World 🌍</h1>
<p id="text2"></p>
<div class="emoji">💞😊</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 3 - Candles -->
<div class="slide">
<h1>Blow the Candles 🕯️💨</h1>
<p>Click the candles to make a wish!</p>
<div id="candles" class="candles">🕯️🕯️🕯️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 4 - Cake -->
<div class="slide">
<h1>Cut the Cake 🎂🍰</h1>
<p>Click the cake to cut it!</p>
<div id="cake" class="cake">🎂</div>
<div id="slice" class="slice">🍰</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 5 - Pizza & Waffles -->
<div class="slide">
<h1>Pizza & Waffles 🍕🧇</h1>
<p id="text5"></p>
<div class="emoji">🍕🧇💖</div>
</div>

<script>
let slides=document.querySelectorAll(".slide");
let index=0;

function next(){
slides[index].classList.remove("active");
index++;
if(index<slides.length){
slides[index].classList.add("active");
startTyping(index);
}
}

/* Typing Effect */
function typeText(id,text,speed=40){
let el=document.getElementById(id);
let i=0;el.innerHTML="";
let interval=setInterval(()=>{el.innerHTML+=text.charAt(i);i++;if(i>=text.length) clearInterval(interval);},speed);
}

/* Messages */
let texts=[
"Today is the day my favorite person was born... and my world became brighter because of you ❤️",
"You are my peace, my smile, my everything 💖",
"Blow the candles and make your birthday wish! 🕯️💨",
"Now cut the cake and enjoy your special day 🎂🍰",
"Imagine us together eating pizza 🍕 and waffles 🧇… life with you is always sweet 💞\n\nI LOVE YOU VAIDEHI ❤️"
];
function startTyping(i){if(i<=4) typeText("text"+(i+1),texts[i]);}
startTyping(0);

/* Floating Hearts with Name */
function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖 Vaidehi 💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(h);
setTimeout(()=>{h.remove();},6000);
}
setInterval(createHeart,500);

/* Candles interaction */
let candles=document.getElementById("candles");
candles.onclick=function(){candles.innerHTML="💨";alert("Candles blown! Make a wish Vaidehi ❤️");}

/* Cake interaction */
let cake=document.getElementById("cake");
let slice=document.getElementById("slice");
cake.onclick=function(){
cake.classList.add("cut");
slice.classList.add("show");
for(let i=0;i<15;i++){createFirework();}
setTimeout(()=>{alert("Cake Cut! Happy Birthday Vaidehi ❤️ I Love You!");},700);
}

/* Fireworks */
function createFirework(){
let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
document.body.appendChild(f);
setTimeout(()=>{f.remove();},1000);
}

/* Music toggle */
function toggleMusic(){
let music=document.getElementById("bgMusic");
if(music.paused){music.play();}else{music.pause();}
}
</script>
</body>
</html>
