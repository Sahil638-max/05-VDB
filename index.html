<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vaidehi ❤️</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#ff4d6d);
color:white;
text-align:center;
overflow:hidden;
}

/* Slides */
.slide{
display:none;
height:100vh;
padding-top:80px;
animation:fade 1s;
}
.active{display:block;}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* Text */
h1{font-size:45px;}
p{font-size:22px;width:70%;margin:auto;min-height:60px;}

/* Button */
.btn{
margin-top:40px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}

/* Emoji */
.emoji{
font-size:90px;
margin-top:20px;
}

/* Floating Hearts */
.heart{
position:absolute;
bottom:-20px;
font-size:25px;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* Final glow */
.glow{
animation:glow 1.5s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px yellow;}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Slide 1 -->
<div class="slide active">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<div class="emoji">✨💖</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 2 -->
<div class="slide">
<h1>You = My World 🌍</h1>
<p id="text2"></p>
<div class="emoji">💞😊</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 3 -->
<div class="slide">
<h1>Our Pizza Date 🍕</h1>
<p id="text3"></p>
<div class="emoji">🍕😍</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 4 -->
<div class="slide">
<h1>Sweet Like You 🧇</h1>
<p id="text4"></p>
<div class="emoji">🧇💖</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 5 -->
<div class="slide">
<h1 class="glow">Happy Birthday ❤️</h1>
<p id="text5"></p>
<div class="emoji">🎂🎆💖</div>
</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function next(){
slides[index].classList.remove("active");
index++;
if(index<slides.length){
slides[index].classList.add("active");
startTyping(index);
}
}

/* Typing Effect */
function typeText(id, text, speed=40){
let el=document.getElementById(id);
let i=0;
el.innerHTML="";
let interval=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},speed);
}

/* Text Content */
let texts=[
"Today is the day my favorite person was born... and honestly, my world became better because of you ❤️",
"You are not just someone special... you are my peace, my smile, my everything 💖",
"I wish we were together right now... eating your favorite pizza 🍕, laughing, and me secretly just staring at you 😍",
"And of course waffles 🧇... because life with you should always be sweet, warm, and full of happiness 💞",
"I just want you to smile always... and if I’m one reason behind it, that’s enough for me ❤️\n\nHappy Birthday Vaidehi 🎂\nI Love You ❤️"
];

/* Start first typing */
function startTyping(i){
typeText("text"+(i+1), texts[i]);
}
startTyping(0);

/* Floating Hearts */
function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(h);
setTimeout(()=>{h.remove();},6000);
}
setInterval(createHeart,500);

</script>

</body>
</html>
