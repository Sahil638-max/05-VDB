<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vaidehi ❤️</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#ff4d6d);
color:white;
text-align:center;
overflow:hidden;
}

.slide{display:none;height:100vh;padding-top:60px;animation:fade 1s;}
.active{display:block;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

h1{font-size:42px;}
p{font-size:22px;width:70%;margin:auto;min-height:70px;}

.btn{
margin-top:30px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}

.emoji{font-size:85px;margin-top:20px;}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

.glow{
animation:glow 1.5s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px yellow;}
}

/* Fireworks */
.firework{
position:absolute;
font-size:35px;
animation:boom 1s ease-out;
}
@keyframes boom{
0%{transform:scale(0);}
100%{transform:scale(1.5);opacity:0;}
}

/* Cake */
.cake{font-size:120px;cursor:pointer;}
.slice{display:none;font-size:100px;}
.show{display:block;}

</style>
</head>

<body>

<!-- Romantic Music -->
<audio id="bgMusic" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>
<button class="btn" onclick="toggleMusic()">🎵 Music</button>

<!-- Slide 1 -->
<div class="slide active">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<div class="emoji">✨💖</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 2 -->
<div class="slide">
<h1>You Are My Everything 💞</h1>
<p id="text2"></p>
<div class="emoji">😊💖</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 3 -->
<div class="slide">
<h1>My Favorite Person 🌍</h1>
<p id="text3"></p>
<div class="emoji">🌍❤️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 4 Candles -->
<div class="slide">
<h1>Make a Wish 🕯️</h1>
<p>Click to blow candles 💨</p>
<div id="candles" class="emoji">🕯️🕯️🕯️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 5 Cake -->
<div class="slide">
<h1>Cut the Cake 🎂</h1>
<p>Click the cake ❤️</p>
<div id="cake" class="cake">🎂</div>
<div id="slice" class="slice">🍰</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 6 Memories -->
<div class="slide">
<h1>Us Together 💕</h1>
<p id="text6"></p>
<div class="emoji">🍕🧇💞</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 7 Promises -->
<div class="slide">
<h1>My Promises 💍</h1>
<p id="text7"></p>
<div class="emoji">🤞❤️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<!-- Slide 8 Final -->
<div class="slide">
<h1 class="glow">Forever Yours ❤️</h1>
<p id="text8"></p>
<div class="emoji">💖♾️</div>
</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function next(){
slides[index].classList.remove("active");
index++;
if(index<slides.length){
slides[index].classList.add("active");
startTyping(index);
if(index>=4) startFireworks();
}
}

/* Typing */
function typeText(id,text){
let el=document.getElementById(id);
let i=0;el.innerHTML="";
let interval=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

/* Messages */
let texts=[
"Today is the day my favorite person came into this world… and my life became beautiful because of you ❤️",
"You are not just special… you are my happiness, my peace, my home 💖",
"Every moment with you feels like a dream I never want to wake up from 🌍❤️",
"",
"",
"Imagine us together… eating pizza 🍕, waffles 🧇, laughing endlessly 💞",
"I promise to stay with you, support you, love you in every moment… no matter what 💍❤️",
"I LOVE YOU VAIDEHI ❤️\nForever and always… ♾️"
];

function startTyping(i){
if(texts[i]) typeText("text"+(i+1),texts[i]);
}
startTyping(0);

/* Hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖 Vaidehi 💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* Candles */
document.getElementById("candles").onclick=function(){
this.innerHTML="💨";
alert("Wish made ❤️");
}

/* Cake */
document.getElementById("cake").onclick=function(){
document.getElementById("slice").classList.add("show");
for(let i=0;i<20;i++) createFirework();
}

/* Fireworks */
function createFirework(){
let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

function startFireworks(){
setInterval(createFirework,300);
}

/* Music */
function toggleMusic(){
let m=document.getElementById("bgMusic");
m.paused?m.play():m.pause();
}

</script>
</body>
</html>
