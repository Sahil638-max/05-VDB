<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF‑8">
<title>For Vaidehi ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff758c,#ff7eb3);
color:white;
text-align:center;
overflow:hidden;
}

/* Slide Container */
.slide{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
animation:fade 1s;
}
.slide.active{display:flex;}

@keyframes fade{from{opacity:0;}to{opacity:1;}}

/* Card */
.card{
background:rgba(255,255,255,0.15);
padding:35px;
border-radius:18px;
backdrop-filter:blur(8px);
width:85%;
max-width:500px;
box-shadow:0 0 25px rgba(255,255,255,0.2);
}

/* Text */
h1{font-size:36px;margin-bottom:15px;}
p{font-size:20px;line-height:1.6;}

/* Button */
.btn{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:20px;
background:white;
color:#ff4d6d;
font-size:17px;
cursor:pointer;
}

/* Glow */
.glow{animation:glow 2s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px white;}to{text-shadow:0 0 35px pink;}

/* Hearts */
.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}
@keyframes float{0%{transform:translateY(0);}100%{transform:translateY(-110vh);}}

/* Fireworks */
.firework{
position:absolute;
font-size:30px;
animation:boom 1.2s ease-out;
}
@keyframes boom{0%{transform:scale(0);}100%{transform:scale(2);opacity:0;}

/* Cake */
.cake{font-size:100px;cursor:pointer;}
.slice{display:none;font-size:80px;}
.show{display:block;}
</style>
</head>

<body>

<!-- 🎶 Kesariya Song (start near main part ~55s) -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/BddP6PYo2gs?autoplay=1&start=55&loop=1&playlist=BddP6PYo2gs"
frameborder="0" allow="autoplay"></iframe>

<!-- Slides -->

<div class="slide active"><div class="card">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>You Are My Heart 💖</h1>
<p id="text2"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>My World 🌍</h1>
<p id="text3"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>Make a Wish 🕯️</h1>
<p>Close your eyes and feel my love ❤️</p>
<div id="candles" style="font-size:40px;cursor:pointer;">🕯️🕯️🕯️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>Cut the Cake 🎂</h1>
<p>Celebrate this beautiful day ❤️</p>
<div id="cake" class="cake">🎂</div>
<div id="slice" class="slice">🍰</div>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>Our Moments 💞</h1>
<p id="text6"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>My Promises 💍</h1>
<p id="text7"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>For You ❤️</h1>
<p id="text8"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>Forever Promise 💖</h1>
<p id="text9"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1>Always There 🫂</h1>
<p id="text10"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div></div>

<div class="slide"><div class="card">
<h1 class="glow">I Love You ❤️</h1>
<p id="text11"></p>
</div></div>

<script>

/* Slides */
let slides=document.querySelectorAll(".slide");
let index=0;
function next(){
slides[index].classList.remove("active");
index++;
if(index<slides.length){
slides[index].classList.add("active");
startTyping(index);
}
}

/* Typing effect */
function typeText(id,text){
let el=document.getElementById(id);
if(!el) return;
let i=0;el.innerHTML="";
let interval=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},35);
}

/* Messages */
let texts=[
"From the moment you came into my life… everything became more beautiful ❤️",

"You are not just special… you are my happiness, my peace, and my home 💖",

"In your smile I see the sunrise… in your eyes I see my forever 🌄",

"", "",

"I imagine us together… laughing, eating pizza 🍕, sharing waffles 🧇… living a life full of love 💞",

"I promise to always respect you, care for you, and stand beside you no matter what 💍",

"You are the best chapter of my story ❤️",

"No matter what happens… I will always choose you 💖",

"I promise I will never leave your side… no matter how hard it gets ❤️",

"I will always be there… whenever you need me… through every moment 🫂❤️",

"I LOVE YOU VAIDEHI ❤️\nForever… endlessly… always yours ♾️"
];

function startTyping(i){
if(texts[i]) typeText("text"+(i+1),texts[i]);
}
startTyping(0);

/* Hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);

/* Fireworks */
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.innerHTML="✨";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
},400);

/* Candle interaction */
document.getElementById("candles").onclick=function(){
this.innerHTML="💨";
}

/* Cake interaction */
document.getElementById("cake").onclick=function(){
document.getElementById("slice").classList.add("show");
}

</script>

</body>
</html>
