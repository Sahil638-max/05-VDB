<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Vaidehi ❤️</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(120deg,#ff4d6d,#ff758c,#ff7eb3);
color:white;
text-align:center;
overflow:hidden;
}

.slide{display:none;height:100vh;padding-top:60px;animation:fade 1s;}
.active{display:block;}

@keyframes fade{from{opacity:0;}to{opacity:1;}}

h1{font-size:42px;}
p{font-size:22px;width:75%;margin:auto;min-height:80px;}

.btn{
margin-top:30px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}

.glow{
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 40px pink;}
}

.heart{
position:absolute;
bottom:-20px;
font-size:22px;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

.firework{
position:absolute;
font-size:35px;
animation:boom 1.2s ease-out;
}
@keyframes boom{
0%{transform:scale(0);}
100%{transform:scale(2);opacity:0;}
}

.cake{font-size:120px;cursor:pointer;}
.slice{display:none;font-size:100px;}
.show{display:block;}
</style>
</head>

<body>

<!-- 🎶 Bollywood Romantic Song -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/Umqb9KENgmk?autoplay=1&loop=1&playlist=Umqb9KENgmk"
frameborder="0" allow="autoplay"></iframe>

<!-- Slides -->

<div class="slide active">
<h1 class="glow">Hey Vaidehi ❤️</h1>
<p id="text1"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>You Are My Heart 💖</h1>
<p id="text2"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>My World 🌍</h1>
<p id="text3"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>Make a Wish 🕯️</h1>
<p>Close your eyes… and feel my love ❤️</p>
<div id="candles" style="font-size:50px;cursor:pointer;">🕯️🕯️🕯️</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>Cut the Cake 🎂</h1>
<p>Celebrate our love ❤️</p>
<div id="cake" class="cake">🎂</div>
<div id="slice" class="slice">🍰</div>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>Our Moments 💞</h1>
<p id="text6"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>My Promises 💍</h1>
<p id="text7"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>For You ❤️</h1>
<p id="text8"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>Forever Promise 💖</h1>
<p id="text9"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1>Always There 🫂</h1>
<p id="text10"></p>
<button class="btn" onclick="next()">Next ➜</button>
</div>

<div class="slide">
<h1 class="glow">I Love You ❤️</h1>
<p id="text11"></p>
</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function next(){
slides[index].classList.remove("active");
index++;
if(index<slides.length){
slides[index].classList.add("active");
startTyping(index);
}
}

/* Typing effect */
function typeText(id,text){
let el=document.getElementById(id);
if(!el) return;
let i=0;el.innerHTML="";
let interval=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

/* Romantic Messages */
let texts=[
"You came into my life like a beautiful song… and now every heartbeat feels like your name ❤️",

"I don’t need the whole world… because you are my world 💖",

"In your eyes, I found my home… in your smile, I found my forever 🌍",

"", "",

"I imagine us… laughing, eating pizza 🍕, sharing waffles 🧇, creating endless memories 💞",

"I promise to stand beside you… in your good days and your worst days… forever 💍❤️",

"You are not just someone I love… you are someone I never want to lose ❤️",

"No matter where life takes us… my heart will always find its way back to you 💖",

"I promise I will always support you, respect you, and love you more with every passing day ❤️",

"I will always be there for you… whenever you need me, in every moment, in every situation 🫂❤️",

"I LOVE YOU VAIDEHI ❤️\nForever… endlessly… and unconditionally ♾️"
];

function startTyping(i){
if(texts[i]) typeText("text"+(i+1),texts[i]);
}
startTyping(0);

/* Hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);

/* Fireworks */
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
},500);

/* Candles */
document.getElementById("candles").onclick=function(){
this.innerHTML="💨";
alert("Your wish will come true ❤️");
}

/* Cake */
document.getElementById("cake").onclick=function(){
document.getElementById("slice").classList.add("show");
}

</script>

</body>
</html>
